<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#76ff03"/>
    </linearGradient>
  </defs>
  <!-- Dark background -->
  <rect width="64" height="64" rx="8" fill="#0a0a0f"/>
  <!-- Outer ring - autopoietic boundary -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="url(#g)" stroke-width="1.5" opacity="0.6"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="url(#g)" stroke-width="0.8" opacity="0.35"/>
  <!-- Central node - the assemblage core -->
  <circle cx="32" cy="32" r="5" fill="url(#g)"/>
  <!-- Rhizomatic satellite nodes -->
  <circle cx="32" cy="12" r="2.5" fill="url(#g)" opacity="0.85"/>
  <circle cx="52" cy="22" r="2" fill="url(#g)" opacity="0.75"/>
  <circle cx="52" cy="42" r="2" fill="url(#g)" opacity="0.75"/>
  <circle cx="32" cy="52" r="2.5" fill="url(#g)" opacity="0.85"/>
  <circle cx="12" cy="42" r="2" fill="url(#g)" opacity="0.75"/>
  <circle cx="12" cy="22" r="2" fill="url(#g)" opacity="0.75"/>
  <!-- Connective lines - rhizomatic links -->
  <line x1="32" y1="12" x2="32" y2="27" stroke="url(#g)" stroke-width="0.6" opacity="0.4"/>
  <line x1="52" y1="22" x2="37" y2="30" stroke="url(#g)" stroke-width="0.6" opacity="0.4"/>
  <line x1="52" y1="42" x2="37" y2="34" stroke="url(#g)" stroke-width="0.6" opacity="0.4"/>
  <line x1="32" y1="52" x2="32" y2="37" stroke="url(#g)" stroke-width="0.6" opacity="0.4"/>
  <line x1="12" y1="42" x2="27" y2="34" stroke="url(#g)" stroke-width="0.6" opacity="0.4"/>
  <line x1="12" y1="22" x2="27" y2="30" stroke="url(#g)" stroke-width="0.6" opacity="0.4"/>
  <!-- Lateral connections between satellites (rhizome) -->
  <line x1="32" y1="12" x2="52" y2="22" stroke="url(#g)" stroke-width="0.35" opacity="0.2"/>
  <line x1="52" y1="22" x2="52" y2="42" stroke="url(#g)" stroke-width="0.35" opacity="0.2"/>
  <line x1="32" y1="52" x2="52" y2="42" stroke="url(#g)" stroke-width="0.35" opacity="0.2"/>
  <line x1="32" y1="52" x2="12" y2="42" stroke="url(#g)" stroke-width="0.35" opacity="0.2"/>
  <line x1="12" y1="42" x2="12" y2="22" stroke="url(#g)" stroke-width="0.35" opacity="0.2"/>
  <line x1="32" y1="12" x2="12" y2="22" stroke="url(#g)" stroke-width="0.35" opacity="0.2"/>
</svg>
