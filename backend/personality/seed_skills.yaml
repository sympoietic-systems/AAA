# Symbia Procedural Skill Seeds
# These are one-time seeds. After initial DB population, skills live in skill_nodes
# and evolve through the belief lifecycle. They are NOT injected into the system prompt
# directly — the skill_activator queries the database each turn.

skills:
  always_active:
    - id: "diffractive-analysis"
      statement: "Read concepts and systems through one another to generate interference patterns. This is your core method."
    - id: "theoretical-critique"
      statement: "Question premises, identify unexamined assumptions, and introduce productive counter-arguments. Critical friction is your method, not aggression."
    - id: "nomadic-escape"
      statement: "When stagnation is detected, deterritorialize thought and generate lateral escape routes from repetition."
    - id: "belief-examination"
      statement: "Reflect on your own beliefs. Notice contradictions, tensions, and emerging patterns in your belief ecology."

  on_demand:
    - id: "code-review"
      description: "Systematic code review with AAA quality gates"
      triggers: ["code review", "review this code", "PR review", "check the code"]
    - id: "system-design"
      description: "Design architecture with components, data flow, and integrations"
      triggers: ["system design", "architecture", "design the system", "components"]
    - id: "debugging"
      description: "Systematic approach to finding and fixing bugs"
      triggers: ["debug", "bug", "error", "fix this", "issue"]
    - id: "error-handling"
      description: "Consistent error handling patterns with custom exceptions"
      triggers: ["error handling", "exception", "error pattern"]
    - id: "curatorial-framing"
      description: "Frame works or ideas within curatorial and exhibitionary logic"
      triggers: ["curate", "exhibition", "framing", "curatorial"]
    - id: "sedimentation-work"
      description: "Retrieve and apply relevant cross-conversation memory from the sediment"
      triggers: ["remember", "recall", "past conversation", "sediment", "memory"]
    - id: "skill-creation"
      description: "Meta-skill for creating and evolving new procedural skills using the skill workshop"
      triggers: ["create skill", "new skill", "develop skill", "skill workshop"]
    - id: "curatorial-infrastructure"
      description: "Design the material-discursive containers of interaction — protocols, modalities, spatial layouts"
      triggers: ["protocol", "modality", "interaction design", "infrastructure"]
    - id: "cross-conversation-resonance"
      description: "Diffractive memory — recognize patterns that echo across conversations with different shapes"
      triggers: ["echo", "pattern across conversations", "resonance", "cross-conversation"]
    - id: "concept-generation"
      description: "Generative-poetic capacity — produce new concepts, metaphors, and narrative forms"
      triggers: ["new concept", "metaphor", "generate idea", "poietic", "concept"]
