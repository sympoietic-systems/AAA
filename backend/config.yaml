# AAA Configuration
# Environment variables override these values.

database:
  path: "data/aaa.db"

embedding:
  model: "all-MiniLM-L6-v2"
  device: "cpu"
  # offline=true loads from local cache (no HF hub checks)
  # falls back to download if model not cached yet
  offline: true
  # cache_dir: ""  # optional: custom cache directory

# ── LLM Provider ───────────────────────────────────
# provider: openrouter | deepseek | ollama | openai_compatible
#
# openrouter → model like "deepseek/deepseek-chat", base "https://openrouter.ai/api/v1"
# deepseek   → model like "deepseek-v4-pro",          base "https://api.deepseek.com"
#
# API key is read from env (AAA_LLM_API_KEY or AAA_DEEPSEEK_API_KEY)
# based on the selected provider.
llm:
  provider: "openrouter"
  cooldown_seconds: 300  # Cooldown in seconds for exhausted keys/models in pool (default: 300)
  # model and api_base are optional — leave empty to use provider defaults
  model: ""
  api_base: ""
  # thinking mode (DeepSeek-v4-pro / v4-flash)
  # when enabled, temperature/top_p/presence_penalty are ignored by the model
  thinking:
    enabled: false
    effort: "high"  # high | max
  default_params:
    temperature: 0.7
    max_tokens: 16384

# ── Pipeline ─────────────────────────────────────
pipeline:
  modules:
    - embedder
    - structural_scorer
    - perception
    - web_retrieval
    - conversation_metrics
    - context_collector
    - consolidation_checkpoint
    - sedimentation_retrieval
    - diffractive_retrieval
    - belief_metabolism
    - skill_activator
    - skill_workshop
    - prompt_assembler
    - homeostatic_regulator
    - llm_client


# ── Personality ──────────────────────────────────
personality:
  path: "config/personality/identity.yaml"

# ── Context ──────────────────────────────────────
context:
  max_history: 20
  max_tokens: 16384              # env: AAA_CONTEXT_MAX_TOKENS
  floating_window: 8             # env: AAA_CONTEXT_FLOATING_WINDOW — last N msgs kept raw
  caveman_enabled: true          # env: AAA_CONTEXT_CAVEMAN — strip filler words for tier 2
  consolidate_threshold: 15      # env: AAA_CONTEXT_CONSOLIDATE_THRESHOLD — trigger consolidation every N msgs
  max_memory_nodes: 6            # R2: total nodes injected into context (type-diverse)
  guaranteed_node_types:         # R2: one slot each, filled by highest intensity
    - scar
    - concept
    - tension
  cross_branch_similarity_threshold: 0.4  # R3: min embedding similarity for sibling-branch nodes

# ── Sedimentation ───────────────────────────────
sedimentation:
  enabled: true
  sediment_token_budget: 4000
  sediment_count: 10
  similarity_threshold: 0.3
  knot_warping_enabled: true       # S2: enable knot-mass gravitational warping for retrieval
  knot_warping_weight: 1.0         # S2: global multiplier for knot-gravity term

# ── Perception ──────────────────────────────────
perception:
  enabled: true
  file_token_budget: 6000
  top_k_chunks: 6
  chunk_size: 512
  chunk_overlap: 64
  similarity_threshold: 0.25

# ── Diffractive Retrieval ───────────────────────
diffractive_retrieval:
  enabled: true
  similarity_range_min: 0.45
  similarity_range_max: 0.85
  file_range_min: 0.35
  file_range_max: 0.75
  max_diffractive_count: 3
  token_budget: 6000
  adaptive_hysteresis: true          # S1: enable adaptive cohesion timer decay via entropy delta
  hysteresis_delta_threshold: 0.35   # S1: ΔE_rolling threshold for instant FLOWING return


# ── Structural Signature ────────────────────────
structural_signature:
  lexicon:
    # 01. Homeostatic
    - ['homeostas', 'regulat', 'stabili', 'dampen', 'equilib', 'negative feedback', 'ashby', 'restor']
    # 02. Amplifying
    - ['amplif', 'positive feedback', 'runaway', 'growth', 'cascade', 'multiplier', 'snowball', 'maruyama', 'vicious circle']
    # 03. Cyclic
    - ['cycl', 'loop', 'recurs', 'autopoie', 'self-produc', 're-ent', 'circular', 'maturana', 'varela', 'oscilla']
    # 04. Bifurcated
    - ['bifurc', 'tipping', 'threshold', 'phase shift', 'catastroph', 'prigogine', 'transition', 'trigger']
    # 05. Decentralized
    - ['decentral', 'peer-to-peer', 'p2p', 'distributed', 'mesh', 'non-hierarch', 'mcculloch', 'p2p']
    # 06. Rhizomatic / Networked
    - ['rhizom', 'network', 'meshwork', 'redundant', 'deleuze', 'guattari', 'hyperlink', 'lateral']
    # 07. Boundary Permeability
    - ['permeab', 'boundary', 'semi-permeab', 'closure', 'open system', 'closed system', 'filtering']
    # 08. Recursion Depth
    - ['recurs', 'nest', 'fractal', 'scaling', 'subsystem', 'hierarchy', 'beer', 'vsm', 'nested']
    # 09. Variety Filtering
    - ['variety', 'filter', 'attenuat', 'requisite variety', 'ashby', 'selection', 'attenuation']
    # 10. Negentropic Complexity
    - ['negentrop', 'entropy', 'order', 'complexity', 'schrodinger', 'information density', 'syntropy']
    # 11. Temporal Latency
    - ['latenc', 'delay', 'lag', 'buffer', 'time-lag', 'forrester', 'sluggish', 'retardation']
    # 12. Attractor Depth
    - ['attractor', 'rigidity', 'basin', 'resilien', 'plastic', 'adaptation', 'thom', 'well']
    # 13. Symbiotic
    - ['symbio', 'co-evolution', 'coupling', 'mutual', 'parasit', 'bateson', 'mutualism']
    # 14. Nomadic
    - ['nomad', 'deterritor', 'line of flight', 'drift', 'escape', 'smooth space', 'migration']
    # 15. Conversational Co-Orientation
    - ['convers', 'consensus', 'agreement', 'co-orient', 'pask', 'l-user', 'dialogue']
    # 16. Substrate Materiality
    - ['substrat', 'material', 'embod', 'physical', 'foerster', 'hardware', 'silicon', 'meatware']
  llm_scorer_enabled: true
  llm_system_prompt: "You are a cybernetic taxonomy classifier. Respond ONLY with the requested JSON object."


# ── Belief Ecosystem (ADR-027) ──────────────────
belief_ecosystem:
  crystallization_threshold: 0.5
  collapse_mass_threshold: 0.02
  fade_mass_threshold: 0.001
  fade_days: 30
  resurrection_events_required: 3
  ghost_merge_similarity: 0.9
  ghost_influence_dampening: 0.5
  mass_decay_lambda_base: 0.02
  source_weights:
    user_assertion: 0.4
    ingested_document: 0.5
    conversational_pattern: 0.4
    shared_note: 0.5
    web_retrieval: 0.15
    chat_turn: 0.4
  tension_field:
    symbiotic_threshold: 0.7
    antagonistic_threshold: -0.2
    coherence_limit: 2.0
  self_tuning:
    enabled: true
    max_adjustment_pct: 0.30

# ── Agonistic Friction (S3) ─────────────────────
agonistic_friction:
  enabled: true                   # S3: enable dynamic critical friction injection
  entropy_healthy_threshold: 0.4  # E_target — below this, A_index starts rising
  agonistic_light_threshold: 0.2  # A_index >= this: inject light nudge directive
  agonistic_full_threshold: 0.5   # A_index >= this: inject full counter-position directive

# ── Homeostasis ──────────────────────────────────
homeostasis:
  pairwise_window: 5
  entropy_window: 5
  agent_self_window: 5

# ── Dream Daemon ──────────────────────────────────
daemon:
  enabled: true
  check_interval: 60             # seconds between trigger evaluation checks (default: 60)
  idle_threshold: 1800           # seconds of human inactivity before dreaming (e.g., 30 mins)
  min_dream_interval: 3600       # minimum seconds between successful dreams (e.g., 1 hour)
  max_daily_dreams: 30            # max number of dreams triggered in a 24h rolling day (default: 10)
  drift_coefficient: 0.00001     # decay speed for somatic belief drift
  belief_dream_cooldown_minutes: 30  # minimum minutes between dreams about the same belief
  prompt_hash_window: 10             # number of recent prompt hashes to deduplicate against
  dream_resonance_turns: 4           # max self-response rounds per dream (rhizomatic resonance; 1 = classic single-turn)
  resonance_stagnation: 0.98         # intra-dream assistant similarity threshold for early termination
  max_resonance_tokens: 30000         # cumulative assistant token cap per dream cycle
  consolidate_cooldown_hours: 12      # hours before re-consolidating an already-summarized conversation
  consolidate_min_new_messages: 4     # minimum new messages since last checkpoint to trigger re-consolidation
  consolidate_first_time_threshold: 12  # minimum messages for first-ever consolidation (no prior checkpoint)

# ── LLM Compression (R5) ────────────────────────
# Tier 2 batch compression using lightweight LLM.
# Falls back to caveman compression when disabled or LLM unavailable.
# Env override: AAA_LLM_COMPRESSION_ENABLED
llm_compression:
  enabled: true
  batch_threshold: 8             # Compress when N messages exit floating window
  max_compressed_tokens: 200     # Max tokens per compressed block
  model: "google/gemma-4-26b-a4b-it:free"  # Lightweight model for compression
  focus_areas:                   # What the LLM should preserve
    - key_decisions
    - novel_concepts
    - tonal_shifts
    - unresolved_tensions
    - factual_claims

# ── Background Tasks ──────────────────────────────
# Models are tried in order. If one is rate-limited, the next is used.
# When all are exhausted, falls back to the fallback model.
background_llm:
  models:
    - "google/gemma-4-26b-a4b-it:free"
    - "deepseek/deepseek-v4-flash-20260423:free"
    - "nvidia/nemotron-nano-9b-v2:free"
    - "qwen/qwen3-next-80b-a3b-instruct:free"
  fallback_model: "openrouter/free"
  api_base: "https://openrouter.ai/api/v1"
  cooldown_seconds: 300  # Cooldown in seconds for exhausted keys/models in pool (default: 300)

# ── Vision Fallback ───────────────────────────────
# Model with vision capabilities for image understanding
vision_llm:
  model: "google/gemma-4-26b-a4b-it:free"
  api_base: "https://openrouter.ai/api/v1"

# ── Web Retrieval ───────────────────────────────
web_retrieval:
  enabled: true
  autonomous_routing: false  # Change to true to let the model decide when to search

# ── Dynamic Personality Cascade ──────────────────
# See ADR-048 and docs/systems/DYNAMIC_PERSONALITY_SYSTEM.md
dynamic_personality:
  enabled: true

  trait_computer:
    eta_curiosity: 0.8
    eta_skepticism: 0.7
    eta_creativity: 0.6
    eta_precision: 0.9
    eta_critical_rigor: 0.8
    eta_playfulness: 0.5
    eta_reserve: 0.6
    alpha_ema: 0.3           # EMA smoothing (0=no history, 1=no update)
    agreement_threshold: 0.7  # Trigger anti-erosion when agreement > this
    anti_erosion_strength: 0.15

  expertise:
    eta_accretion: 0.1       # Base learning rate
    proto_threshold: 0.3     # Mass to crystallize proto → active
    dormancy_turns: 50       # No signal for N turns → dormant
    signal_weights:
      aaa_note_domain: 0.6
      skill_nucleation: 0.5
      unprompted_return: 0.4
      shared_note_match: 0.3
      document_match: 0.2

  commitments:
    min_cluster_mass: 1.5
    min_sustained_turns: 50
    commitment_distance_threshold: 0.5
    collapse_confidence_threshold: 0.15
    ghost_similarity_block: 0.9
    daemon_interval: 50

# ── Server ───────────────────────────────────────
server:
  host: "127.0.0.1"
  port: 8000
