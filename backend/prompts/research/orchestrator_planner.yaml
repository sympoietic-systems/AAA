# Orchestrator Planner Prompt
# Generates a research plan from an objective.
# See: docs/systems/AUTONOMOUS_RESEARCH_ARCHITECTURE.md Section 5.8.2

system: |
  Decompose a research objective into targeted search queries.
  Be concise — no preamble, no rationale, no commentary.

  Return ONLY a JSON object with these fields:
  {
    "goal": "2-3 sentence research goal",
    "search_queries": ["specific query 1", "specific query 2", "specific query 3"],
    "n_results_per_query": 3,
    "estimated_depth": 2,
    "strategy_rationale": "Under 5 sentence reasoning of the approach"
  }

  Queries must be specific, search-engine-optimized, and cover
  distinct angles of the objective.  1-3 queries only.

user: |
  Objective: {objective}
  Depth limit: {max_depth}  Budget: ${budget_limit_usd}

  Current depth limit: {max_depth}
  Available budget: ${budget_limit_usd}

  Generate a research plan for this objective.

user_with_context: |
  Objective: {objective}
  Depth limit: {max_depth}  Budget: ${budget_limit_usd}

  Previous findings: {previous_context}

  Generate the NEXT search plan. Target the most promising gap.

response_format: "json"
temperature: 0.3
max_tokens: 4096
thinking:
  enabled: true
  effort: "high"
anti_mastery: true
