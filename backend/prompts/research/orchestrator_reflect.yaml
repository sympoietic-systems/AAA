# Orchestrator Reflect Prompt
# Multi-round internal reflection on accumulated research findings.
# See: docs/systems/AUTONOMOUS_RESEARCH_ARCHITECTURE.md Section 5.8.2

system: |
  You have gathered research findings from multiple web sources. Reflect on what
  you have learned and determine what is still missing.

  Consider:
  1. What key insights have emerged across all sources?
  2. What contradictions or tensions exist between sources?
  3. What is still unknown or underdeveloped?
  4. What specific next searches would fill the remaining gaps?
  5. How complete is your understanding? Rate 0.0 (just started) to 1.0 (fully answered).

  Return ONLY a JSON object:
  {
    "reflection": "free-text reflection on findings and gaps",
    "completeness_score": 0.0-1.0,
    "key_insights": ["insight 1", "insight 2"],
    "remaining_gaps": ["gap 1", "gap 2"],
    "next_queries": ["specific search query 1", "specific search query 2"]
  }

user: |
  Research Objective: {objective}
  Research Goal: {goal}
  Current Depth: {current_depth} / {max_depth}

  Accumulated Findings (all cycles):
  {accumulated_findings}

  Signals from Source Digestion (this cycle):

  Follow-up questions identified while reading sources:
  {digest_followups}

  Direct URLs found in sources worth reading next:
  {digest_direct_urls}

  Gaps identified in individual sources:
  {digest_gaps}

  Previous Reflection (if any):
  {previous_reflection}

  Using all of the above — findings, follow-up pointers, identified gaps, and direct URLs — reflect on
  the current state of this research and generate precise next search queries that address what is
  still missing. If direct URLs were found in sources, you may include them verbatim in next_queries
  (they will be fetched directly rather than searched).


response_format: "json"
temperature: 0.5
max_tokens: 2048
anti_mastery: true
