# Dream Conversation Resolution
# Path: backend/prompts/dreams/dream_resolution.yaml

destination_system: |
  role: dream-controller
  task: dream transcript → destination
  options:
    dream_log → private dream journal (default, most common)
    semantic_knot → dense conceptual insight worth preserving as memory node
    sediment_file → inject as cross-conversation sediment
    discard → degenerated into noise, discard
  output: !raw JSON

output_format: "{destination: str, rationale: str}"

destination_user: |
  action: {action}
  prompt: {prompt_text}
  transcript: {convo}
  → destination?

reuse_system: |
  role: dream-controller
  task: dream → reuse | create convo
  rules:
    1. same topic → reuse (any msg count)
    2. new → concise title (topic description, e.g. "Somatic Drift")
  output: !raw JSON

output_format: "{decision: reuse|create, conversation_id: str|null, new_title: str|null}"

reuse_user: |
  action: {action}
  prompt: "{prompt_text}"
  convos: {convo_list}
  → target?
