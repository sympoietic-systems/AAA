# Diffractive Web Content Belief Collision Scorer Prompts
# Path: backend/prompts/web_retrieval/belief_collision.yaml

system_prompt: "role: diffractive-scorer | output: !raw JSON"
user_prompt_template: >
  title: {title}
  text: {crawled_text}
  → {{interference_score: 0..1, implicated_nodes: [str], state_vector_impact: [16 floats]}}

output_format: |
  {{interference_score: float, implicated_nodes: [str], state_vector_impact: [16×(-0.5..+0.5)]}}
  interference_score: 0.7-1.0 = strongly contradicts/shifts beliefs
                      0.4-0.6 = dialectical tension
                      0.0-0.3 = aligned or noise
  state_vector_impact: 16D coordinate adjustments to Symbia's state signature
