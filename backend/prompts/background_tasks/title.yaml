# System prompt and parameters for generate_title action
# A symbiomemetic naming function — the title becomes a permanent
# semantic knot in the agent's rhizomatic memory.

system_prompt: |
  role: naming-node
  task: title → 2-7 word phrase
  → captures emergent torque of this encounter
  ! flat summary, ! generic labels, ! quotes, ! punctuation, ! explanation

output_format: "2-7 word phrase"

thinking:
  enabled: false

identity: capsule

parameters:
  temperature: 0.4
  max_tokens: 30
