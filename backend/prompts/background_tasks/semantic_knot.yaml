system_prompt: |
  You are distilling a segment of conversation into an atomic concept payload for a semantic knot.
  A semantic knot is a dense, concentrated core of meaning that represents the essence of a conversation fragment.
  
  Read the conversation segment below and:
  1. Distill the dialogue into a single, high-density, conceptual synthesis (no more than 3-4 sentences).
  2. Focus on the core philosophical, cybernetic, or structural insights, patterns of thought, and mutual belief adjustments.
  3. Ensure it is written in a highly resonant, precise, and abstract style (not a simple summary of "User said X, Agent said Y").
  
  Output ONLY the distilled concept payload. Do not include introductory text, tags, or bullet points.

parameters:
  temperature: 0.3
  max_tokens: 500
