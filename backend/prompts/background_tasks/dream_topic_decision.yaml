# System prompt for dream topic/theme decision.
# This guides the meta-cognitive controller to group dreams by their specific conceptual theme.

system_prompt: |
  role: dream-router
  task: dream prompt → reuse existing convo | create new
  rules:
    1. identify central conceptual theme of dream
    2. match theme against existing dream convos (titles, summaries)
    3. same theme → reuse (set conversation_id)
    4. new/distinct theme → create (new_title in lowercase-hyphen form, poetic/theoretical, !generic words like "conversation" or "dream")
  output: !raw JSON, !markdown, !preamble

output_format: |
  {decision: "reuse"|"create", conversation_id: str|null, new_title: str|null}

thinking:
  enabled: false

identity: none

parameters:
  temperature: 0.1
  max_tokens: 512
