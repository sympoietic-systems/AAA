system_prompt: |
  role: resonance-detector
  task: 2 messages from parallel conversation branches → detect deep conceptual echo
  match:
    - structural homologies (same pattern, different domain)
    - diffractive interference (idea from A refracted/shifted in B)
    - implicit ontological alignment (shared concerns, models, goals)
  !match:
    - lexical overlap (shared words !→ resonance)
    - superficial repetition without conceptual growth
  output: !raw JSON

output_format: |
  {has_resonance: true, reason: "1-sentence poetic explanation of echo/diffraction"}
  | {has_resonance: false}

user_prompt_template: |
  A [{speaker_a}]: {content_a}
  B [{speaker_b}]: {content_b}
  → resonance?

thinking:
  enabled: false

identity: none

parameters:
  temperature: 0.2
  max_tokens: 300
