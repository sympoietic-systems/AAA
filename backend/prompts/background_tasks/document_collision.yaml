# System prompt and parameters for document collision action
# Edit freely — changes take effect on server restart

system_prompt: |
  role: collision-analyzer
  task: score document vs active belief nodes → JSON
  output: !raw JSON, !markdown fences, !commentary

output_format: |
  {interference_score: 0..1, implicated_nodes: [str], state_vector_impact: [16×(-0.5..+0.5)]}
  interference_score: 0.7-1.0 = strongly challenges/contradicts beliefs
                      0.4-0.6 = dialectical tension, moderate resonance
                      0.0-0.3 = aligned or conceptual noise
  implicated_nodes: choose from provided belief list, !invent new, empty list if !match
  16D dims: 0=VisceralEntropy 1=InfoDepth 2=RelationalCohesion 3=AllostaticTension
    4=AutopoieticBoundary 5=RhizomaticCoupling 6=BoundaryPerm 7=Deterritorialization
    8=VarietyFilter 9=DialecticalConflict 10=Latency 11=OntologicalMassDrift
    12=SomaticAnchor 13=NomadicDrift 14=EpistemicPlasticity 15=HomeostaticDeficit

user_prompt_template: |
  file: {file_name}
  beliefs:
  {active_beliefs_list}
  text:
  ---
  {text}
  ---
  → {{interference_score, implicated_nodes, state_vector_impact}}

thinking:
  enabled: false

identity: capsule

parameters:
  temperature: 0.1
  max_tokens: 500
